# Use NFC pads as GPIOS
CONFIG_NFCT_PINS_AS_GPIOS=y

# Enable deep sleep
CONFIG_ZMK_SLEEP=y

# Studio runs on the USB dongle central, not the wireless peripherals.
CONFIG_ZMK_STUDIO=n

# Carry each half's true charger state to the dongle.
CONFIG_ZMK_POINTING=y
CONFIG_INPUT_GPIO_KEYS=y

# Both halves are peripherals of the dedicated dongle.
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
